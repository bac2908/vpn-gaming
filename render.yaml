services:
  - type: web
    name: vpn-gaming
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vpn-gaming-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALG
        value: HS256
      - key: JWT_EXPIRE_MIN
        value: "60"
      - key: APP_BASE_URL
        value: https://vpn-gaming.onrender.com
      - key: CORS_ORIGINS
        value: https://vpn-gaming.onrender.com
      - key: SEED_DEFAULT_DATA
        value: "true"
      - key: SEED_ADMIN_EMAIL
        value: admin@vpngaming.com
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SMTP_FALLBACK_TO_CONSOLE
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://vpn-gaming.onrender.com/auth/google/callback
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_JSON
        value: "false"
      - key: MOMO_ENDPOINT
        value: https://test-payment.momo.vn/v2/gateway/api/create
      - key: MOMO_PARTNER_CODE
        sync: false
      - key: MOMO_ACCESS_KEY
        sync: false
      - key: MOMO_SECRET_KEY
        sync: false
      - key: MOMO_REDIRECT_URL
        value: https://vpn-gaming.onrender.com/app/topup/result
      - key: MOMO_IPN_URL
        value: https://vpn-gaming.onrender.com/payments/momo/ipn
      - key: MOMO_REQUEST_TYPE
        value: payWithMethod

databases:
  - name: vpn-gaming-db
    plan: free
    region: singapore
    databaseName: vpn_app
    user: vpn_user
